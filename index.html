<input type="range" min="0" max="100" id="speed">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://ac-motor-speed-control-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("speed").oninput = function(){

set(ref(db,'AC_Motor/speed'), parseInt(this.value));

}

</script>
