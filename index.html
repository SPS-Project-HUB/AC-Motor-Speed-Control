<input type="range" min="0" max="100" value="0" id="speedSlider">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC...",
  authDomain: "ac-motor-speed-control.firebaseapp.com",
  databaseURL: "https://ac-motor-speed-control-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ac-motor-speed-control",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase();

const slider = document.getElementById("speedSlider");

slider.oninput = function() {

  set(ref(db,"motor/speed"), parseInt(this.value));

};

</script>
